# PURPOSE: GitHub Actions workflow for publishing releases to Sonatype Central.
# PURPOSE: Triggered on version tags (v*); runs tests then publishes all modules.
name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: |
            ~/.mill
            ~/.cache/mill
            out/
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill', 'project.scala') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Run tests
        run: ./mill __.test

      - name: Publish to Sonatype Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.MILL_PGP_SECRET_BASE64 }}
          MILL_PGP_PASSPHRASE: ${{ secrets.MILL_PGP_PASSPHRASE }}
        run: ./mill mill.javalib.SonatypeCentralPublishModule/publishAll
